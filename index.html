<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yawsa · Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@700;800&family=DM+Mono:wght@300;400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g1:#facc15;
  --g2:#f59e0b;
  --glass:rgba(6,5,0,0.78);
  --glass2:rgba(3,3,0,0.85);
  --bd:rgba(250,204,21,0.12);
  --bd2:rgba(250,204,21,0.06);
  --tx:#fff9e6;
  --mu:rgba(255,220,80,0.45);
  --dm:rgba(200,160,30,0.35);
}
html,body{
  height:100%;overflow:hidden;
  font-family:'DM Sans',sans-serif;color:var(--tx);
}

.bg{
  position:fixed;inset:0;z-index:0;
  background:url('https://files.catbox.moe/e1d52e.gif') center/cover no-repeat;
  transform:scale(1.04);
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(125deg,rgba(0,0,0,.88)0%,rgba(5,4,0,.72)45%,rgba(0,0,0,.92)100%);
}

.rain{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.drop{
  position:absolute;top:-30px;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(250,204,21,.14));
  animation:fall linear infinite;
}
@keyframes fall{to{transform:translateY(115vh);}}

.page{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

/* ── CARD ── */
.card{
  width:500px;
  background:var(--glass);
  border:1px solid var(--bd);
  border-radius:26px;
  backdrop-filter:blur(38px) saturate(1.5) brightness(.92);
  -webkit-backdrop-filter:blur(38px) saturate(1.5) brightness(.92);
  box-shadow:
    0 0 0 1px rgba(250,204,21,.06),
    0 8px 28px rgba(0,0,0,.6),
    0 40px 90px rgba(0,0,0,.7),
    0 70px 120px rgba(0,0,0,.45),
    0 0 60px rgba(250,204,21,.04),
    inset 0 1px 0 rgba(255,220,50,.1),
    inset 0 -1px 0 rgba(0,0,0,.5);
  overflow:hidden;
  opacity:0;transform:translateY(24px) scale(.97);
  animation:cardIn .9s cubic-bezier(.16,1,.3,1) .1s forwards;
}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1);}}

/* top bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 9px;
  border-bottom:1px solid var(--bd2);
}

/* ── HEART LIKE BUTTON ── */
.like-wrap{display:flex;align-items:center;gap:7px;}
.like-btn{
  background:none;border:none;padding:0;
  display:flex;align-items:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
}
.like-btn:hover{transform:scale(1.2);}
.like-btn svg{width:22px;height:22px;transition:fill .2s,stroke .2s;}
.like-btn svg .heart-shape{
  fill:none;
  stroke:#fff;
  stroke-width:1.8;
  transition:fill .25s,stroke .25s;
}
.like-btn.liked svg .heart-shape{
  fill:#ef4444;
  stroke:#ef4444;
}
.like-count{
  font-family:'DM Mono',monospace;font-size:11px;
  color:rgba(255,255,255,.5);letter-spacing:.05em;
  transition:color .2s;
  min-width:0;
}
.like-btn.liked ~ .like-count{color:#ef4444;}

/* floating +1 */
.float-num{
  position:absolute;
  font-family:'DM Mono',monospace;font-size:12px;font-weight:700;
  color:#ef4444;pointer-events:none;
  animation:floatUp .7s ease forwards;
  z-index:99;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-28px) scale(.8);}
}

/* ── SAVED INDICATOR ── */
.saved-chip{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;
  color:rgba(250,204,21,.45);
  opacity:0;transition:opacity .4s;
  pointer-events:none;user-select:none;
}
.saved-chip.show{opacity:1;}

/* badges */
.badges{display:flex;align-items:center;gap:5px;}
.badge{display:flex;align-items:center;}
.badge img{width:22px;height:22px;display:block;object-fit:contain;}

/* body */
.body{display:flex;align-items:stretch;padding:18px 20px 16px;gap:0;}

.left{
  display:flex;flex-direction:column;align-items:center;
  flex-shrink:0;width:130px;
  opacity:0;animation:fadeUp .5s ease .45s forwards;
  justify-content:center;
}

.avatar-wrap{position:relative;width:110px;height:110px;}
.avatar-wrap::before{
  content:'';position:absolute;inset:-3px;border-radius:18px;
  background:conic-gradient(from 0deg,var(--g1) 0%,var(--g2) 45%,var(--g1) 75%,transparent 100%);
  animation:spin 4s linear infinite;opacity:.85;z-index:0;
}
.avatar-wrap::after{
  content:'';position:absolute;inset:-6px;border-radius:21px;
  background:conic-gradient(from 200deg,transparent 30%,var(--g2) 65%,transparent 90%);
  animation:spin 6.5s linear infinite reverse;opacity:.35;z-index:0;
}
@keyframes spin{to{transform:rotate(360deg);}}
.avatar{
  position:relative;z-index:1;width:110px;height:110px;border-radius:14px;
  object-fit:cover;border:3px solid rgba(3,3,0,.98);display:block;
  box-shadow:0 0 0 1px rgba(250,204,21,.25),0 0 32px rgba(250,204,21,.2),0 8px 24px rgba(0,0,0,.6);
}
.sdot{
  position:absolute;bottom:5px;right:5px;z-index:2;
  width:13px;height:13px;border-radius:50%;background:#22c55e;
  border:2.5px solid rgba(3,3,0,.98);box-shadow:0 0 9px rgba(34,197,94,.75);
}

.vdiv{
  width:1px;
  background:linear-gradient(to bottom,transparent,rgba(250,204,21,.12),transparent);
  align-self:stretch;margin:0 20px;flex-shrink:0;
}

.right{
  flex:1;min-width:0;
  opacity:0;animation:fadeUp .5s ease .6s forwards;
  display:flex;flex-direction:column;justify-content:center;
}
.song-title{
  font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:52px;
  letter-spacing:.06em;line-height:.88;
  background:linear-gradient(140deg,#fff9e6 0%,#facc15 45%,#f59e0b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.song-sub{
  font-family:'DM Sans',sans-serif;font-style:italic;
  font-size:11px;color:var(--mu);letter-spacing:.07em;margin-bottom:18px;
}

.socials{display:flex;align-items:center;gap:22px;}
.soc{
  color:rgba(250,204,21,.3);
  text-decoration:none;display:flex;align-items:center;
  transition:color .18s,transform .2s,filter .18s;
}
.soc:hover{color:var(--g1);transform:translateY(-3px) scale(1.15);filter:drop-shadow(0 0 8px rgba(250,204,21,.7));}
.soc svg{width:26px;height:26px;fill:currentColor;}

/* player */
.player{
  margin:0 14px 14px;
  background:var(--glass2);
  border:1px solid var(--bd);
  border-radius:18px;
  padding:14px 16px 13px;
  opacity:0;animation:fadeUp .5s ease .75s forwards;
  box-shadow:0 4px 18px rgba(0,0,0,.5),0 0 30px rgba(250,204,21,.03),inset 0 1px 0 rgba(255,220,50,.07),inset 0 -1px 0 rgba(0,0,0,.35);
}

.pl-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.pl-art{
  width:46px;height:46px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 0 0 2px rgba(250,204,21,.35),0 4px 14px rgba(0,0,0,.5);
  border:2px solid rgba(3,3,0,.98);
}
.pl-art img{width:100%;height:100%;object-fit:cover;display:block;}
.pl-meta{flex:1;min-width:0;}
.pl-song{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-artist{font-size:11px;color:var(--mu);margin-top:2px;}

.wave{display:flex;align-items:flex-end;gap:2.5px;height:20px;flex-shrink:0;}
.wave span{
  width:3px;border-radius:3px;
  background:linear-gradient(to top,var(--g2),var(--g1));
  animation:wv .65s ease-in-out infinite;transform-origin:bottom;
}
.wave span:nth-child(1){height:8px;animation-delay:0s;}
.wave span:nth-child(2){height:17px;animation-delay:.11s;}
.wave span:nth-child(3){height:10px;animation-delay:.22s;}
.wave span:nth-child(4){height:20px;animation-delay:.07s;}
.wave span:nth-child(5){height:12px;animation-delay:.17s;}
.wave span:nth-child(6){height:16px;animation-delay:.28s;}
.wave.idle span{animation-play-state:paused;height:3px!important;opacity:.2;}
@keyframes wv{0%,100%{transform:scaleY(.35);}50%{transform:scaleY(1);}}

.prog{position:relative;height:3px;background:rgba(255,255,255,.06);border-radius:10px;margin-bottom:10px;}
.prog-f{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--g2),var(--g1));transition:width .1s linear;position:relative;}
.prog-f::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:9px;height:9px;border-radius:50%;
  background:var(--g1);box-shadow:0 0 8px rgba(250,204,21,.8);
  opacity:0;transition:opacity .15s;
}
.prog:hover .prog-f::after{opacity:1;}

.ctrl-row{display:flex;align-items:center;gap:4px;}
.time{font-family:'DM Mono',monospace;font-size:10px;color:var(--dm);letter-spacing:.04em;min-width:28px;}

.btn-flat{
  background:none;border:none;color:rgba(250,204,21,.4);
  padding:5px 6px;border-radius:7px;transition:color .14s,background .14s;display:flex;align-items:center;
}
.btn-flat:hover{color:var(--g1);background:rgba(250,204,21,.06);}
.btn-flat svg{width:18px;height:18px;fill:currentColor;}

.btn-play-flat{
  background:none;border:none;color:var(--g1);
  padding:4px 6px;border-radius:8px;
  transition:color .15s,transform .18s,filter .18s;display:flex;align-items:center;
}
.btn-play-flat:hover{color:#fff;transform:scale(1.15);filter:drop-shadow(0 0 10px rgba(250,204,21,.8));}
.btn-play-flat svg{width:26px;height:26px;fill:currentColor;}

.spacer{flex:1;}

.vol{display:flex;align-items:center;gap:6px;}
.vol-ic{color:var(--dm);display:flex;}
.vol-ic svg{width:12px;height:12px;fill:currentColor;}
.vol-slider{
  width:60px;height:3px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.07);border-radius:10px;outline:none;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  box-shadow:0 0 6px rgba(250,204,21,.6);
}
.vol-val{font-family:'DM Mono',monospace;font-size:9px;color:var(--dm);min-width:24px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ── ENTRY OVERLAY ── */
#entry{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
  cursor:pointer;
  animation:fadeIn .4s ease forwards;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
#entry.hide{animation:fadeOut .5s ease forwards;pointer-events:none;}
@keyframes fadeOut{to{opacity:0;}}
#entry .e-icon{
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(250,204,21,.5);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(250,204,21,.4);}50%{box-shadow:0 0 42px rgba(250,204,21,.75);}}
#entry .e-icon svg{width:24px;height:24px;fill:#000;}
#entry .e-txt{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;
  color:rgba(255,230,100,.6);text-transform:uppercase;
}
</style>
</head>

        </button>
        <span class="time" id="curT" style="margin-left:4px;">0:00</span>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:rgba(250,204,21,.15);margin:0 2px;">/</span>
        <span class="time" id="durT">0:00</span>
        <div class="spacer"></div>
        <div class="vol">
          <div class="vol-ic"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></div>
          <input class="vol-slider" type="range" min="0" max="100" value="70" oninput="setVol(this.value)" id="volS"/>
          <span class="vol-val" id="volV">70%</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ── RAIN ── */
(()=>{
  const r=document.getElementById('rain');
  for(let i=0;i<60;i++){
    const d=document.createElement('div');d.className='drop';
    const l=Math.random()*100,dur=.45+Math.random()*1.1,dly=Math.random()*4,h=50+Math.random()*130,op=.05+Math.random()*0.14;
    d.style.cssText=`left:${l}%;height:${h}px;opacity:${op};animation-duration:${dur}s;animation-delay:-${dly}s;`;
    r.appendChild(d);
  }
})();

/* ── AUDIO ── */
const audio=document.getElementById('audio');
let playing=false;
const fmt=s=>{const m=Math.floor(s/60),sc=Math.floor(s%60).toString().padStart(2,'0');return`${m}:${sc}`;};
audio.ontimeupdate=()=>{
  if(!audio.duration)return;
  document.getElementById('progF').style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('curT').textContent=fmt(audio.currentTime);
  document.getElementById('durT').textContent=fmt(audio.duration);
};
audio.onended=()=>{audio.currentTime=0;setPlay(false);};
function seek(e){
  const b=document.getElementById('prog'),rc=b.getBoundingClientRect();
  const ratio=Math.max(0,Math.min(1,(e.clientX-rc.left)/rc.width));
  if(audio.duration)audio.currentTime=ratio*audio.duration;
}
function togglePlay(){if(playing){audio.pause();setPlay(false);}else{audio.play();setPlay(true);}}
function setPlay(v){
  playing=v;
  document.getElementById('playIco').innerHTML=v
    ?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    :'<path d="M8 5v14l11-7z"/>';
  document.getElementById('wave').classList.toggle('idle',!v);
}
function restart(){audio.currentTime=0;if(!playing){audio.play();setPlay(true);}}
function setVol(v){audio.volume=v/100;document.getElementById('volV').textContent=v+'%';}
audio.volume=0.7;

function enterSite(){
  const overlay=document.getElementById('entry');
  audio.play().then(()=>setPlay(true)).catch(()=>{});
  overlay.classList.add('hide');
  setTimeout(()=>overlay.remove(),500);
}

window.addEventListener('load',()=>{
  // Try silent autoplay — if it works, skip overlay
  audio.play().then(()=>{
    setPlay(true);
    const overlay=document.getElementById('entry');
    if(overlay) overlay.remove();
  }).catch(()=>{
    // Browser blocked — overlay stays, user clicks to start
  });
});
</script>
</body>
</html>
